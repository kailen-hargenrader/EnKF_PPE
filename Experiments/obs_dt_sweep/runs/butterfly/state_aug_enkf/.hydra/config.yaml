seed: 42
N_ens: 50
x_dim: 3
p_dim: 3
m: 3
state_init:
  _target_: enkf_ppe.Utils.initialisations.GaussianInit
  std: 0.5
  track_grads: false
param_init:
  _target_: enkf_ppe.Utils.initialisations.GaussianInit
  std: 0.01
  track_grads: false
model:
  _target_: enkf_ppe.Models.ENKF.StateAugEnKF
  transition_fn:
    _target_: enkf_ppe.Dynamics.Lorentz63.forward
    _partial_: true
    dt: 0.01
  obs_fn:
    _target_: enkf_ppe.Utils.observation_fns.FullObservation
  process_noise_cov:
    _target_: enkf_ppe.Utils.covariances.ScaledIdentity
    dim: ${x_dim}
    std: 0.5
    track_grads: false
  param_noise_cov:
    _target_: enkf_ppe.Utils.covariances.ScaledIdentity
    dim: ${p_dim}
    std: 0.01
    track_grads: false
  obs_noise_cov:
    _target_: enkf_ppe.Utils.covariances.ScaledIdentity
    dim: ${m}
    std: 1.0
    track_grads: false
  time_step: 0.01
data_path: Lorentz63/sigma10.0000_rho28.0000_beta2.6667_dt0.0100.pt
sweep:
  n_forecasts:
  - 1
  - 2
  - 5
  - 10
  - 20
  - 50
experiment:
  T_use: 6000
  spinup_frac: 0.2
  spinup_min: 10
