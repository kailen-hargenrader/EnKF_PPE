# Cross-platform environment for macOS (derived from environment.yml)
name: AD-EnKF-env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.20
  - scipy>=1.6
  - matplotlib>=3.3
  - pytorch
  - torchaudio
  - torchvision
  - tqdm
  - pip
  - pip:
    - torchdiffeq==0.2.2
variables:
  KMP_DUPLICATE_LIB_OK: 'True'
