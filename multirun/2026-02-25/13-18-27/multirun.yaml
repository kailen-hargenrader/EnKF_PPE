hydra:
  run:
    dir: runs/glv_param_est_torch_1
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - init_theta_scale=0.5,0.8,1.0
    - lr=0.005,0.01,0.02
    - process_std=0.0,0.01,0.02
    - N_ens=50,100
    - chunk_length=10,20
  job:
    name: glv_param_est_run
    chdir: false
    override_dirname: N_ens=50,100,chunk_length=10,20,init_theta_scale=0.5,0.8,1.0,lr=0.005,0.01,0.02,process_std=0.0,0.01,0.02
    id: ???
    num: ???
    config_name: glv_param_est
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/ethanfeng/Desktop/Caltech/Junior/ACM 154/Projects/EnKF_PPE_clone
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/ethanfeng/Desktop/Caltech/Junior/ACM 154/Projects/EnKF_PPE_clone/ADEnKF/experiments/glv_param_est/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
seed: 42
N_ens: 50
x_dim: 5
p_dim: 18
data_truth_path: gLV/data/glv_ahidden0p00_truth.npz
data_obs_path: gLV/data/glv_ahidden0p00_obs.npz
init_theta_scale: 1.0
process_std: 0.01
init_Q_diag_scale: 0.05
init_cov_diag:
- 0.25
- 0.25
- 0.25
- 0.25
- 0.25
epochs: 200
chunk_length: 30
lr: 0.01
lr_lambda_epoch_start: 40
lr_lambda_exponent: -0.5
dt: 0.5
ode_method: rk4
ode_step_size: 0.1
adjoint_method: rk4
adjoint_step_size: 0.1
save_plot: true
plot_path: glv_parameter_estimation.png
